<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 부재료 실적 모니터링</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/variables.css">
  <script>
    (function() {
      var t = localStorage.getItem("theme");
      if (t === "dark") document.documentElement.setAttribute("data-theme", "dark");
    })();
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--primary-light) 100%);
      position: relative;
      overflow: hidden;
      color: var(--white);
    }
    body::before,
    body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 143, 0, 0.12), transparent 72%);
    }
    body::before {
      width: 620px;
      height: 620px;
      top: -220px;
      right: -140px;
    }
    body::after {
      width: 420px;
      height: 420px;
      bottom: -180px;
      left: -110px;
    }
    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 0 20px;
    }
    .login-card {
      background: var(--surface);
      color: var(--text);
      border-radius: 20px;
      padding: 48px 40px 36px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.32);
    }
    .login-header {
      text-align: center;
      margin-bottom: 34px;
    }
    .login-logo {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary-dark);
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .login-logo span { color: var(--accent); }
    .login-sub {
      font-size: 13px;
      color: var(--text-light);
      line-height: 1.55;
    }
    .login-divider {
      width: 42px;
      height: 3px;
      border-radius: 999px;
      background: var(--accent);
      margin: 16px auto 0;
    }
    .field {
      margin-bottom: 18px;
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .field input {
      width: 100%;
      padding: 13px 14px;
      border: 2px solid var(--gray-200);
      border-radius: 10px;
      font-size: 14px;
      color: var(--text);
      background: var(--gray-50);
      outline: none;
      transition: all 0.2s ease;
    }
    .field input:focus {
      border-color: var(--primary);
      background: var(--surface);
      box-shadow: 0 0 0 4px rgba(26, 35, 126, 0.08);
    }
    .password-field {
      margin-bottom: 18px;
    }
    .password-input-wrap {
      position: relative;
    }
    .password-input-wrap input {
      padding-right: 48px;
    }
    .password-toggle {
      position: absolute;
      top: 50%;
      right: 12px;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      color: var(--gray-500);
      cursor: pointer;
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }
    .password-toggle:hover {
      background: rgba(26, 35, 126, 0.08);
      color: var(--primary);
    }
    .password-toggle:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(26, 35, 126, 0.12);
    }
    .error-box {
      display: none;
      margin-bottom: 18px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #ffebee;
      border: 1px solid #ffcdd2;
      color: var(--danger);
      font-size: 13px;
      font-weight: 600;
      line-height: 1.45;
    }
    .error-box.show { display: block; }
    .login-btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: var(--white);
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(26, 35, 126, 0.34);
    }
    .secondary-btn {
      width: 100%;
      border: 1.5px solid var(--gray-300);
      border-radius: 10px;
      padding: 12px;
      background: var(--surface);
      color: var(--primary-dark);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
    }
    .credential-hint {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 12px;
      background: var(--gray-50);
      color: var(--text-light);
      font-size: 12px;
      line-height: 1.6;
    }
    .credential-hint strong {
      color: var(--primary-dark);
    }
    .login-footer {
      text-align: center;
      margin-top: 16px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
    }
    @media (max-width: 480px) {
      .login-card { padding: 34px 24px 28px; }
    }
    [data-theme="dark"] body {
      background: linear-gradient(135deg, #0a0a1e 0%, #1a1a3e 50%, #2a2a5e 100%);
    }
    [data-theme="dark"] .login-card {
      background: #1e1e33;
      color: #e8e8f0;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
    }
    [data-theme="dark"] .login-logo { color: #c5cae9; }
    [data-theme="dark"] .login-sub { color: #a0a0bb; }
    [data-theme="dark"] .field label { color: #e8e8f0; }
    [data-theme="dark"] .field input {
      border-color: #44446b;
      background: #252540;
      color: #e8e8f0;
    }
    [data-theme="dark"] .field input:focus {
      border-color: #5c6bc0;
      background: #2a2a50;
      box-shadow: 0 0 0 4px rgba(92, 107, 192, 0.15);
    }
    [data-theme="dark"] .login-btn {
      background: linear-gradient(135deg, #2a2a5e, #3949ab);
    }
    [data-theme="dark"] .secondary-btn {
      border-color: #44446b;
      background: #252540;
      color: #c5cae9;
    }
    [data-theme="dark"] .credential-hint {
      background: #252540;
      color: #a0a0bb;
    }
    [data-theme="dark"] .credential-hint strong { color: #c5cae9; }
    [data-theme="dark"] .error-box {
      background: rgba(239, 83, 80, 0.12);
      border-color: rgba(239, 83, 80, 0.3);
      color: #ef5350;
    }
    [data-theme="dark"] .password-toggle { color: #8888a8; }
    [data-theme="dark"] .password-toggle:hover {
      background: rgba(92, 107, 192, 0.15);
      color: #9fa8da;
    }
    .login-theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.85);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: background 0.2s, transform 0.2s;
    }
    .login-theme-toggle:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: scale(1.08);
    }
    .login-theme-toggle svg { width: 20px; height: 20px; }
    .login-theme-toggle .icon-moon { display: block; }
    .login-theme-toggle .icon-sun { display: none; }
    [data-theme="dark"] .login-theme-toggle .icon-moon { display: none; }
    [data-theme="dark"] .login-theme-toggle .icon-sun { display: block; }
  </style>
</head>
<body>
  <button class="login-theme-toggle" id="loginThemeToggle" type="button" aria-label="다크 모드 전환">
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">동국제강 <span>DK</span></div>
        <div class="login-sub">동국제강 원료기획팀 대시보드</div>
        <div class="login-divider"></div>
      </div>

      <form id="loginForm">
        <div class="error-box" id="errorBox">아이디 또는 비밀번호가 올바르지 않습니다.</div>

        <div class="field">
          <label for="userId">아이디</label>
          <input id="userId" name="userId" type="text" autocomplete="username" placeholder="dongkuk1" value="dongkuk1">
        </div>

        <div class="field password-field">
          <label for="password">비밀번호</label>
          <div class="password-input-wrap">
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="1234" value="1234">
            <button class="password-toggle" id="passwordToggle" type="button" aria-label="비밀번호 표시" aria-pressed="false">
              <svg id="passwordToggleIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M2 12C4.6 7.8 8 5.7 12 5.7C16 5.7 19.4 7.8 22 12C19.4 16.2 16 18.3 12 18.3C8 18.3 4.6 16.2 2 12Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="3.1" stroke="currentColor" stroke-width="1.8"/>
              </svg>
            </button>
          </div>
        </div>

        <button class="login-btn" type="submit">로그인</button>
        <button class="secondary-btn" id="quickLoginBtn" type="button">테스트 계정 바로 입장</button>
      </form>

      <div class="credential-hint">
        <strong>테스트 계정</strong><br>
        아이디 `dongkuk1` / 비밀번호 `1234`
      </div>
    </div>
    <div class="login-footer">동일한 디자인 톤을 유지하되, 데이터는 첨부 엑셀 기준으로 재구성했습니다.</div>
  </div>

  <script src="js/storage.js"></script>
  <script>
    if (sessionStorage.getItem("loggedInUser")) {
      location.href = "index.html";
    }

    const form = document.getElementById("loginForm");
    const errorBox = document.getElementById("errorBox");
    const quickLoginBtn = document.getElementById("quickLoginBtn");
    const passwordInput = document.getElementById("password");
    const passwordToggle = document.getElementById("passwordToggle");
    const passwordToggleIcon = document.getElementById("passwordToggleIcon");

    const fallbackUsers = [
      {
        id: "dongkuk1",
        password: "1234",
        name: "이돈석 팀장",
        dept: "원료기획팀",
        role: "admin",
        status: "active"
      },
      {
        id: "dongkuk2",
        password: "1234",
        name: "박영수 대리",
        dept: "원료기획팀",
        role: "user",
        status: "active"
      }
    ];

    function getRegisteredUsers() {
      try {
        var stored = window.appStorage ? window.appStorage.getSync("usersData") : undefined;
        if (stored === undefined) {
          var raw = localStorage.getItem("usersData");
          if (!raw) return null;
          stored = JSON.parse(raw);
        }
        return Array.isArray(stored.data) && stored.data.length ? stored.data : null;
      } catch {
        return null;
      }
    }

    function findUser(userId, password) {
      const registeredUsers = getRegisteredUsers();
      const source = registeredUsers || fallbackUsers;
      const user = source.find((item) => item.id === userId && item.password === password);
      if (!user) {
        return null;
      }
      if (user.status === "inactive") {
        return { blocked: true };
      }
      const displayName = user.position ? `${user.name} ${user.position}` : user.name;
      return {
        id: user.id,
        name: displayName,
        dept: user.dept || "원료기획팀",
        role: user.role || "user"
      };
    }

    function loginUser(user) {
      sessionStorage.setItem(
        "loggedInUser",
        JSON.stringify({
          id: user.id,
          name: user.name,
          dept: user.dept,
          role: user.role
        })
      );
      location.href = "index.html";
    }

    function loginAsDemoUser() {
      const demoUser = findUser("dongkuk1", "1234");
      if (demoUser && !demoUser.blocked) {
        loginUser(demoUser);
        return;
      }
      errorBox.textContent = "기본 계정 정보를 확인할 수 없습니다.";
      errorBox.classList.add("show");
    }

    form.addEventListener("submit", function (event) {
      event.preventDefault();
      const userId = document.getElementById("userId").value.trim().toLowerCase();
      const password = document.getElementById("password").value.trim();
      const user = findUser(userId, password);

      if (user && !user.blocked) {
        loginUser(user);
        return;
      }

      errorBox.textContent = user && user.blocked
        ? "비활성화된 계정입니다. 관리자에게 문의하세요."
        : "아이디 또는 비밀번호가 올바르지 않습니다.";
      errorBox.classList.add("show");
    });

    quickLoginBtn.addEventListener("click", loginAsDemoUser);

    passwordToggle.addEventListener("click", function () {
      const shouldShow = passwordInput.type === "password";
      passwordInput.type = shouldShow ? "text" : "password";
      passwordToggle.setAttribute("aria-label", shouldShow ? "비밀번호 숨기기" : "비밀번호 표시");
      passwordToggle.setAttribute("aria-pressed", shouldShow ? "true" : "false");
      passwordToggleIcon.innerHTML = shouldShow
        ? '<path d="M3 3L21 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M10.6 6.1C11.1 5.9 11.5 5.8 12 5.8C16 5.8 19.4 7.9 22 12C21 13.6 19.9 14.9 18.7 15.9M8.9 8.3C6.3 9.3 4 11.2 2 12C3 13.6 4.2 15 5.5 16C7.4 17.6 9.6 18.3 12 18.3C13 18.3 14 18.2 14.9 17.8M10 10C9.4 10.5 9 11.2 9 12C9 13.7 10.3 15 12 15C12.8 15 13.5 14.6 14 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>'
        : '<path d="M2 12C4.6 7.8 8 5.7 12 5.7C16 5.7 19.4 7.8 22 12C19.4 16.2 16 18.3 12 18.3C8 18.3 4.6 16.2 2 12Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><circle cx="12" cy="12" r="3.1" stroke="currentColor" stroke-width="1.8"/>';
    });

    document.getElementById("userId").addEventListener("input", function () {
      errorBox.classList.remove("show");
    });
    document.getElementById("password").addEventListener("input", function () {
      errorBox.classList.remove("show");
    });

    document.getElementById("loginThemeToggle").addEventListener("click", function() {
      var html = document.documentElement;
      var isDark = html.getAttribute("data-theme") === "dark";
      if (isDark) {
        html.removeAttribute("data-theme");
        localStorage.setItem("theme", "light");
      } else {
        html.setAttribute("data-theme", "dark");
        localStorage.setItem("theme", "dark");
      }
    });
  </script>
</body>
</html>
