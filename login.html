<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 부재료 실적 모니터링</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/variables.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--primary-light) 100%);
      position: relative;
      overflow: hidden;
      color: var(--white);
    }
    body::before,
    body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 143, 0, 0.12), transparent 72%);
    }
    body::before {
      width: 620px;
      height: 620px;
      top: -220px;
      right: -140px;
    }
    body::after {
      width: 420px;
      height: 420px;
      bottom: -180px;
      left: -110px;
    }
    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 0 20px;
    }
    .login-card {
      background: var(--white);
      color: var(--text);
      border-radius: 20px;
      padding: 48px 40px 36px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.32);
    }
    .login-header {
      text-align: center;
      margin-bottom: 34px;
    }
    .login-logo {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary-dark);
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .login-logo span { color: var(--accent); }
    .login-sub {
      font-size: 13px;
      color: var(--text-light);
      line-height: 1.55;
    }
    .login-divider {
      width: 42px;
      height: 3px;
      border-radius: 999px;
      background: var(--accent);
      margin: 16px auto 0;
    }
    .field {
      margin-bottom: 18px;
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .field input {
      width: 100%;
      padding: 13px 14px;
      border: 2px solid var(--gray-200);
      border-radius: 10px;
      font-size: 14px;
      color: var(--text);
      background: var(--gray-50);
      outline: none;
      transition: all 0.2s ease;
    }
    .field input:focus {
      border-color: var(--primary);
      background: var(--white);
      box-shadow: 0 0 0 4px rgba(26, 35, 126, 0.08);
    }
    .error-box {
      display: none;
      margin-bottom: 18px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #ffebee;
      border: 1px solid #ffcdd2;
      color: var(--danger);
      font-size: 13px;
      font-weight: 600;
      line-height: 1.45;
    }
    .error-box.show { display: block; }
    .login-btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: var(--white);
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(26, 35, 126, 0.34);
    }
    .secondary-btn {
      width: 100%;
      border: 1.5px solid var(--gray-300);
      border-radius: 10px;
      padding: 12px;
      background: var(--white);
      color: var(--primary-dark);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
    }
    .credential-hint {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 12px;
      background: var(--gray-50);
      color: var(--text-light);
      font-size: 12px;
      line-height: 1.6;
    }
    .credential-hint strong {
      color: var(--primary-dark);
    }
    .login-footer {
      text-align: center;
      margin-top: 16px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
    }
    @media (max-width: 480px) {
      .login-card { padding: 34px 24px 28px; }
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">동국제강 <span>DK</span></div>
        <div class="login-sub">첨부 파일 기반 동국제강 원료기획팀 대시보드</div>
        <div class="login-divider"></div>
      </div>

      <form id="loginForm">
        <div class="error-box" id="errorBox">아이디 또는 비밀번호가 올바르지 않습니다.</div>

        <div class="field">
          <label for="userId">아이디</label>
          <input id="userId" name="userId" type="text" autocomplete="username" placeholder="dongkuk1" value="dongkuk1">
        </div>

        <div class="field">
          <label for="password">비밀번호</label>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="1234" value="1234">
        </div>

        <button class="login-btn" type="submit">로그인</button>
        <button class="secondary-btn" id="quickLoginBtn" type="button">테스트 계정 바로 입장</button>
      </form>

      <div class="credential-hint">
        <strong>테스트 계정</strong><br>
        아이디 `dongkuk1` / 비밀번호 `1234`
      </div>
    </div>
    <div class="login-footer">동일한 디자인 톤을 유지하되, 데이터는 첨부 엑셀 기준으로 재구성했습니다.</div>
  </div>

  <script>
    if (sessionStorage.getItem("loggedInUser")) {
      location.href = "index.html";
    }

    const form = document.getElementById("loginForm");
    const errorBox = document.getElementById("errorBox");
    const quickLoginBtn = document.getElementById("quickLoginBtn");

    const fallbackUsers = [
      {
        id: "dongkuk1",
        password: "1234",
        name: "이돈석 팀장",
        dept: "원료기획팀",
        role: "admin",
        status: "active"
      },
      {
        id: "dongkuk2",
        password: "1234",
        name: "박영수 대리",
        dept: "원료기획팀",
        role: "user",
        status: "active"
      }
    ];

    function getRegisteredUsers() {
      try {
        const raw = localStorage.getItem("usersData");
        if (!raw) {
          return null;
        }
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed.data) && parsed.data.length ? parsed.data : null;
      } catch {
        return null;
      }
    }

    function findUser(userId, password) {
      const registeredUsers = getRegisteredUsers();
      const source = registeredUsers || fallbackUsers;
      const user = source.find((item) => item.id === userId && item.password === password);
      if (!user) {
        return null;
      }
      if (user.status === "inactive") {
        return { blocked: true };
      }
      const displayName = user.position ? `${user.name} ${user.position}` : user.name;
      return {
        id: user.id,
        name: displayName,
        dept: user.dept || "원료기획팀",
        role: user.role || "user"
      };
    }

    function loginUser(user) {
      sessionStorage.setItem(
        "loggedInUser",
        JSON.stringify({
          id: user.id,
          name: user.name,
          dept: user.dept,
          role: user.role
        })
      );
      location.href = "index.html";
    }

    function loginAsDemoUser() {
      const demoUser = findUser("dongkuk1", "1234");
      if (demoUser && !demoUser.blocked) {
        loginUser(demoUser);
        return;
      }
      errorBox.textContent = "기본 계정 정보를 확인할 수 없습니다.";
      errorBox.classList.add("show");
    }

    form.addEventListener("submit", function (event) {
      event.preventDefault();
      const userId = document.getElementById("userId").value.trim().toLowerCase();
      const password = document.getElementById("password").value.trim();
      const user = findUser(userId, password);

      if (user && !user.blocked) {
        loginUser(user);
        return;
      }

      errorBox.textContent = user && user.blocked
        ? "비활성화된 계정입니다. 관리자에게 문의하세요."
        : "아이디 또는 비밀번호가 올바르지 않습니다.";
      errorBox.classList.add("show");
    });

    quickLoginBtn.addEventListener("click", loginAsDemoUser);

    document.getElementById("userId").addEventListener("input", function () {
      errorBox.classList.remove("show");
    });
    document.getElementById("password").addEventListener("input", function () {
      errorBox.classList.remove("show");
    });
  </script>
</body>
</html>
